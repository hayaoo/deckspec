name: Release

on:
  push:
    branches: [main]
  workflow_dispatch: # NPM_TOKEN ローテーション後などに手動再実行するため

concurrency: ${{ github.workflow }}-${{ github.ref }}

permissions:
  contents: write      # changesets が Version PR・タグ作成に必要
  pull-requests: write # changesets が PR 更新に必要
  id-token: write      # npm Trusted Publisher (OIDC) で publish するため

jobs:
  release:
    runs-on: ubuntu-latest
    environment: release
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 # v5.0.0

      # Node 24 は npm 11.x をバンドルしており Trusted Publisher (OIDC) を
      # 安定サポートする。pnpm 9 の OIDC 実装には既知バグがあるため、publish
      # 段は scripts/publish.sh から npm CLI を直接呼ぶ。
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24
          cache: pnpm
          registry-url: 'https://registry.npmjs.org'

      - run: pnpm install --frozen-lockfile
      - run: pnpm build

      # npm Trusted Publisher (OIDC) で publish。NPM_TOKEN は意図的に渡さない。
      - uses: changesets/action@6a0a831ff30acef54f2c6aa1cbbc1096b066edaf # v1.7.0
        with:
          publish: ./scripts/publish.sh
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
