name: Release

on:
  push:
    branches: [main]
  workflow_dispatch: # NPM_TOKEN ローテーション後などに手動再実行するため

concurrency: ${{ github.workflow }}-${{ github.ref }}

permissions:
  contents: write      # changesets が Version PR・タグ作成に必要
  pull-requests: write # changesets が PR 更新に必要
  id-token: write      # npm Trusted Publisher (OIDC) で publish するため

jobs:
  release:
    runs-on: ubuntu-latest
    environment: release
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 # v5.0.0

      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: 22
          cache: pnpm
          registry-url: 'https://registry.npmjs.org'

      - run: pnpm install --frozen-lockfile
      - run: pnpm build

      # OIDC を確実に使うため、publish は npm CLI に揃える (pnpm 9 の OIDC
      # 実装は不安定で、npm 側 Trusted Publisher と組み合わせると 404 になる)。
      # 11.5.1+ の npm に上げ、changesets/action から呼ぶ。
      - run: npm install -g npm@latest

      # npm Trusted Publisher (OIDC) で publish。NPM_TOKEN は意図的に渡さない。
      - uses: changesets/action@6a0a831ff30acef54f2c6aa1cbbc1096b066edaf # v1.7.0
        with:
          publish: ./scripts/publish.sh
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
