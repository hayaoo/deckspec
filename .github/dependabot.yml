version: 2

updates:
  # npm 依存パッケージの脆弱性アップデート
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 10

  # GitHub Actions のバージョン更新
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
